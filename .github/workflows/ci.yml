name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: conformance + tests + types
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out the verifier
        uses: actions/checkout@v4
        with:
          path: aitp-verifier-py
      # The conformance runner + tests read the byte-pinned golden vectors from
      # the canonical spec checkout via --spec-dir. Pull it as a sibling so this
      # repo genuinely re-verifies against the spec's vectors on every push —
      # the whole point of an independent second implementation.
      - name: Check out the AITP spec
        uses: actions/checkout@v4
        with:
          repository: agentidentitytrustprotocol/agentidentitytrustprotocol
          path: agentidentitytrustprotocol
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        working-directory: aitp-verifier-py
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Conformance (independent re-derivation of every golden vector)
        working-directory: aitp-verifier-py
        run: python run_conformance.py --spec-dir ../agentidentitytrustprotocol
      - name: Unit tests
        working-directory: aitp-verifier-py
        env:
          AITP_SPEC: ${{ github.workspace }}/agentidentitytrustprotocol
        run: pytest -q
      - name: Types (mypy --strict)
        working-directory: aitp-verifier-py
        run: mypy
