version: 2
updates:
  # Python deps declared in pyproject.toml (setuptools / pip ecosystem).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
