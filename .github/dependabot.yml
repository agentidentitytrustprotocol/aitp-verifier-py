version: 2
updates:
  # Python deps declared in pyproject.toml (setuptools / pip ecosystem).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major-updates:
        update-types: ["major"]

  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
